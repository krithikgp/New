# ============================================================
# InsurePro - Application Configuration
# ============================================================

spring.application.name=InsurePro

# -------------------------------------------------------
# DATABASE CONFIGURATION  (PostgreSQL — default)
# -------------------------------------------------------
# Change these values to match your local/cloud DB setup
spring.datasource.url=jdbc:postgresql://localhost:5432/insurepro_db
spring.datasource.username=insurepro_user
spring.datasource.password=insurepro_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# For MySQL, replace the three lines above with:
# spring.datasource.url=jdbc:mysql://localhost:3306/insurepro_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -------------------------------------------------------
# JPA / HIBERNATE
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
# Use 'create' on first run to auto-create tables, then switch to 'update'
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.open-in-view=false

# -------------------------------------------------------
# SERVER
# -------------------------------------------------------
server.port=8080
server.servlet.context-path=/api/v1

# -------------------------------------------------------
# JWT SECURITY
# -------------------------------------------------------
# Replace this with a strong 256-bit secret in production
jwt.secret=InsureProSecretKey2024SuperSecureAndLongEnoughFor256Bits!!
jwt.expiration.ms=86400000
# 24 hours = 86400000 ms

# -------------------------------------------------------
# FILE UPLOADS (for claim documents)
# -------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload.dir=./uploads/claims

# -------------------------------------------------------
# EMAIL / NOTIFICATIONS (update with your SMTP credentials)
# -------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -------------------------------------------------------
# ACTUATOR (Health/Metrics endpoints)
# -------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# -------------------------------------------------------
# SWAGGER / OPENAPI
# -------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# -------------------------------------------------------
# LOGGING
# -------------------------------------------------------
logging.level.com.insurepro=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/insurepro.log
